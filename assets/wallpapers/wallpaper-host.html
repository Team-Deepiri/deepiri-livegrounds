<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Interactive Wallpaper</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body { 
      width: 100%; 
      height: 100%; 
      overflow: hidden;
      background: #000;
    }
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }
    #info {
      position: fixed;
      bottom: 10px;
      left: 10px;
      color: rgba(255,255,255,0.3);
      font-family: sans-serif;
      font-size: 12px;
      z-index: -1;
    }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>
  <div id="info">Interactive Wallpaper Active - Move mouse to interact, click to spawn</div>

  <script>
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    
    const CONFIG = {
      particleCount: 250,
      colors: ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#ffeaa7', '#dfe6e9'],
      bgColor: '#0d0d14'
    };

    class Particle {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = (Math.random() - 0.5) * 2;
        this.size = Math.random() * 6 + 3;
        this.color = CONFIG.colors[Math.floor(Math.random() * CONFIG.colors.length)];
        this.life = 1;
        this.decay = Math.random() * 0.008 + 0.003;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;
        if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height || this.life <= 0) this.reset();
      }
      draw() {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }

    let particles = [];
    let mouseX = 0, mouseY = 0;
    let width, height;

    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }

    function init() {
      resize();
      window.addEventListener('resize', resize);
      
      window.addEventListener('mousemove', e => {
        mouseX = e.clientX;
        mouseY = e.clientY;
      });

      window.addEventListener('click', e => {
        for (let i = 0; i < 30; i++) {
          const p = new Particle();
          p.x = e.clientX;
          p.y = e.clientY;
          p.vx = (Math.random() - 0.5) * 12;
          p.vy = (Math.random() - 0.5) * 12;
          particles.push(p);
        }
        if (particles.length > CONFIG.particleCount * 1.5) particles.splice(0, 30);
      });

      for (let i = 0; i < CONFIG.particleCount; i++) {
        particles.push(new Particle());
      }

      loop();
    }

    function loop() {
      ctx.fillStyle = CONFIG.bgColor;
      ctx.fillRect(0, 0, width, height);

      ctx.strokeStyle = 'rgba(255,255,255,0.02)';
      ctx.lineWidth = 1;
      for (let x = 0; x < width; x += 60) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke();
      }
      for (let y = 0; y < height; y += 60) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke();
      }

      const gradient = ctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, 250);
      gradient.addColorStop(0, 'rgba(78, 205, 196, 0.08)');
      gradient.addColorStop(1, 'transparent');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);

      for (const p of particles) {
        const dx = p.x - mouseX, dy = p.y - mouseY, dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 120 && dist > 0) {
          const force = (120 - dist) / 120;
          p.vx += (dx/dist) * force * 0.3;
          p.vy += (dy/dist) * force * 0.3;
        }
        p.update();
        p.draw();
      }

      requestAnimationFrame(loop);
    }

    init();
  </script>
</body>
</html>
